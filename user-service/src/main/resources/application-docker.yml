server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://user-db:5432/userdb
    username: user
    password: userpass
  jpa:
    hibernate:
      ddl-auto: update   # pentru demo; la proiecte reale folosește Flyway/Liquibase
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
