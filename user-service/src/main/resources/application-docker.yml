server:
  port: 8081   # match cu EXPOSE 8081 din Dockerfile

spring:
  datasource:
    url: jdbc:postgresql://user-db:5432/users_db
    username: postgres
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never

auth:
  service:
    baseUrl: http://auth-service:8083
