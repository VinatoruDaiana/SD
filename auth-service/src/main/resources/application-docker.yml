server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://auth-db:5432/auth_db
    username: postgres
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never

# call-uri către celelalte servicii din rețeaua Docker
user:
  service:
    baseUrl: http://user-service:8081

# dacă ai nevoie de CORS:
frontend:
  origin: http://localhost
