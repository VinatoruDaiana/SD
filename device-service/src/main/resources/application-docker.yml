server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://device-db:5432/devicedb
    username: device
    password: devicepass
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
